<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Note Agent - 智能笔记系统</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="app-container">
        <!-- 顶部导航 -->
        <header class="top-bar">
            <div class="logo">
                <span class="logo-icon">📝</span>
                <span class="logo-text">Note Agent</span>
            </div>
            <div class="top-actions">
                <button class="btn btn-primary" onclick="showCreateProjectModal()">
                    + 新建项目
                </button>
            </div>
        </header>

        <!-- 主内容区 -->
        <main class="main-content">
            <div class="welcome-section">
                <h1>欢迎使用 Note Agent</h1>
                <p class="subtitle">智能学习笔记与知识库系统</p>
                
                <div class="features-grid">
                    <div class="feature-card">
                        <div class="feature-icon">📁</div>
                        <h3>项目管理</h3>
                        <p>为每门课程或主题创建独立项目，集中管理资料与笔记</p>
                    </div>
                    <div class="feature-card">
                        <div class="feature-icon">📚</div>
                        <h3>知识库</h3>
                        <p>上传PDF文档，构建可检索的知识库，支持智能问答</p>
                    </div>
                    <div class="feature-card">
                        <div class="feature-icon">💬</div>
                        <h3>AI对话</h3>
                        <p>与AI助手对话，获取基于资料的精准回答</p>
                    </div>
                    <div class="feature-card">
                        <div class="feature-icon">✨</div>
                        <h3>智能生成</h3>
                        <p>自动生成摘要、大纲、学习卡片等学习成果</p>
                    </div>
                </div>

                <div class="projects-section">
                    <h2>我的项目</h2>
                    <div id="projects-list" class="projects-grid">
                        <!-- 项目列表将通过JS动态加载 -->
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- 创建项目模态框 -->
    <div id="create-project-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>创建新项目</h3>
                <button class="modal-close" onclick="hideCreateProjectModal()">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label for="project-name">项目名称</label>
                    <input type="text" id="project-name" placeholder="输入项目名称">
                </div>
                <div class="form-group">
                    <label for="project-desc">项目描述（可选）</label>
                    <textarea id="project-desc" placeholder="输入项目描述"></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="hideCreateProjectModal()">取消</button>
                <button class="btn btn-primary" onclick="createProject()">创建</button>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
    <script>
        // 页面加载时获取项目列表
        document.addEventListener('DOMContentLoaded', () => {
            loadProjects();
        });
    </script>
</body>
</html>
